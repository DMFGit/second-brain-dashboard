<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121417">
  <title>Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="grain"></div>

  <!-- Desktop Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">SB</span>
      <span class="sidebar-title">Second Brain</span>
    </div>
    <div class="sidebar-nav">
      <a class="nav-item active" data-page="home" href="#home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a class="nav-item" data-page="notes" href="#notes">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Notes</span>
      </a>
      <a class="nav-item" data-page="library" href="#library">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span>Library</span>
      </a>
      <a class="nav-item" data-page="review" href="#review">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Review</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- Mobile Bottom Tab Bar -->
  <nav class="tab-bar" id="tabBar">
    <a class="tab-item active" data-page="home" href="#home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="tab-item" data-page="notes" href="#notes">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Notes</span>
    </a>
    <a class="tab-item" data-page="library" href="#library">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span>Library</span>
    </a>
    <a class="tab-item" data-page="review" href="#review">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Review</span>
    </a>
  </nav>

  <!-- Page Container -->
  <div class="page-container" id="pageContainer">

    <!-- ==================== HOME PAGE ==================== -->
    <div class="page active" id="page-home">
      <header class="header">
        <div class="header-date">
          <h1 class="date-display" id="dateDisplay"></h1>
          <p class="greeting" id="greeting"></p>
        </div>
        <div class="stats-row" id="statsRow">
          <div class="stat">
            <span class="stat-num" id="statToday">—</span>
            <span class="stat-label">today</span>
          </div>
          <div class="stat stat--alert">
            <span class="stat-num" id="statOverdue">—</span>
            <span class="stat-label">overdue</span>
          </div>
          <div class="stat">
            <span class="stat-num" id="statUpcoming">—</span>
            <span class="stat-label">upcoming</span>
          </div>
          <div class="stat stat--muted">
            <span class="stat-num" id="statInbox">—</span>
            <span class="stat-label">inbox</span>
          </div>
        </div>
      </header>

      <section class="section" id="todaySection">
        <h2 class="section-title">
          <span class="section-title-text">Today</span>
          <span class="section-count" id="todayCount"></span>
        </h2>
        <div class="task-list" id="todayTasks">
          <div class="skeleton-loader"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line"></div></div>
        </div>
      </section>

      <section class="section" id="upcomingSection">
        <h2 class="section-title">
          <span class="section-title-text">This Week</span>
          <span class="section-count" id="upcomingCount"></span>
        </h2>
        <div class="task-list" id="upcomingTasks">
          <div class="skeleton-loader"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title section-title--collapsible" id="projectsToggle">
          <span class="section-title-text">Projects</span>
          <span class="section-count" id="projectsCount"></span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </h2>
        <div class="projects-list collapsed" id="projectsList">
          <div class="skeleton-loader"><div class="skeleton-line short"></div></div>
        </div>
      </section>
    </div>

    <!-- ==================== NOTES PAGE ==================== -->
    <div class="page" id="page-notes">
      <header class="page-header notes-header">
        <div class="notes-header-top">
          <h1 class="page-title">Notes</h1>
          <span class="notes-total" id="notesTotal"></span>
        </div>
        <div class="notes-toolbar">
          <div class="search-bar notes-search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-input" id="notesSearch" placeholder="Search notes..." autocomplete="off">
          </div>
          <div class="project-select-wrap">
            <svg class="project-select-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <select id="notesProjectFilter" class="project-select">
              <option value="">All Projects</option>
            </select>
          </div>
        </div>
        <div class="filter-scroll" id="notesFilterRow">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="Journal">
            <span class="filter-chip-dot" style="background:var(--amber)"></span>Journal
          </button>
          <button class="filter-chip" data-filter="Meeting">
            <span class="filter-chip-dot" style="background:#6ba3d4"></span>Meeting
          </button>
          <button class="filter-chip" data-filter="Reference">
            <span class="filter-chip-dot" style="background:var(--green)"></span>Reference
          </button>
          <button class="filter-chip" data-filter="Web Clip">
            <span class="filter-chip-dot" style="background:#9b7ec4"></span>Web Clip
          </button>
          <button class="filter-chip" data-filter="favorites">
            <span class="filter-chip-dot" style="background:var(--amber)"></span>Favorites
          </button>
        </div>
      </header>
      <div class="notes-list" id="notesList">
        <div class="skeleton-loader"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line"></div></div>
      </div>
      <div class="notes-load-more hidden" id="notesLoadMore">
        <button class="load-more-btn" id="loadMoreBtn">Load more</button>
      </div>
    </div>

    <!-- ==================== LIBRARY PAGE ==================== -->
    <div class="page" id="page-library">
      <header class="page-header">
        <h1 class="page-title">Library</h1>
        <div class="library-tabs" id="libraryTabs">
          <button class="lib-tab active" data-lib="books">Books</button>
          <button class="lib-tab" data-lib="movies">Movies</button>
          <button class="lib-tab" data-lib="recipes">Recipes</button>
        </div>
      </header>

      <div class="library-panel active" id="lib-books">
        <div class="lib-section">
          <h3 class="lib-section-title">Currently Reading</h3>
          <div class="lib-grid" id="currentlyReading">
            <div class="skeleton-loader"><div class="skeleton-line"></div></div>
          </div>
        </div>
        <div class="lib-section">
          <h3 class="lib-section-title">All Books</h3>
          <div class="lib-list" id="allBooks">
            <div class="skeleton-loader"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
          </div>
        </div>
      </div>

      <div class="library-panel" id="lib-movies">
        <div class="lib-section">
          <h3 class="lib-section-title">Watchlist</h3>
          <div class="lib-grid" id="movieWatchlist">
            <div class="skeleton-loader"><div class="skeleton-line"></div></div>
          </div>
        </div>
        <div class="lib-section">
          <h3 class="lib-section-title">All Movies</h3>
          <div class="lib-list" id="allMovies">
            <div class="skeleton-loader"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
          </div>
        </div>
      </div>

      <div class="library-panel" id="lib-recipes">
        <div class="lib-section">
          <h3 class="lib-section-title">Recipes</h3>
          <div class="lib-grid" id="allRecipes">
            <div class="skeleton-loader"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== REVIEW PAGE ==================== -->
    <div class="page" id="page-review">
      <header class="page-header">
        <h1 class="page-title">Weekly Review</h1>
        <p class="page-subtitle" id="reviewDateRange"></p>
      </header>

      <section class="review-section">
        <h3 class="review-section-title">
          <span>Completed This Week</span>
          <span class="section-count" id="completedCount"></span>
        </h3>
        <div class="review-list" id="completedTasks">
          <div class="skeleton-loader"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
        </div>
      </section>

      <section class="review-section">
        <h3 class="review-section-title">
          <span>Carrying Over</span>
          <span class="section-count" id="carryOverCount"></span>
        </h3>
        <div class="review-list" id="carryOverTasks">
          <div class="skeleton-loader"><div class="skeleton-line"></div></div>
        </div>
      </section>

      <section class="review-section">
        <h3 class="review-section-title">
          <span>Next Week</span>
          <span class="section-count" id="nextWeekCount"></span>
        </h3>
        <div class="review-list" id="nextWeekTasks">
          <div class="skeleton-loader"><div class="skeleton-line"></div></div>
        </div>
      </section>
    </div>

    <!-- Spacer for capture bar / tab bar -->
    <div class="bottom-spacer"></div>
  </div>

  <!-- Capture bar -->
  <div class="capture-bar" id="captureBar">
    <div class="capture-inner">
      <input type="text" class="capture-input" id="captureInput" placeholder="Capture a thought..." autocomplete="off">
      <button class="capture-btn capture-btn--mic" id="micBtn" aria-label="Voice input">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="1" width="6" height="12" rx="3"/>
          <path d="M19 10v1a7 7 0 01-14 0v-1M12 19v4M8 23h8"/>
        </svg>
        <div class="mic-pulse"></div>
      </button>
      <button class="capture-btn capture-btn--send" id="sendBtn" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Error banner -->
  <div class="error-banner hidden" id="errorBanner">
    <span>Unable to reach Notion</span>
    <button class="error-dismiss" id="errorDismiss">&times;</button>
  </div>

  <script src="app.js?v=2"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
